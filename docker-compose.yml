# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zephyr_audit_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zephyr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zephyr_password}
      POSTGRES_DB: ${POSTGRES_DB:-zephyr_audit}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
